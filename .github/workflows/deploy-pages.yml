name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Every Sunday at 02:00 UTC (10:00 Beijing time)
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install openai

      - name: Generate analysis
        run: |
          echo "DEBUG: AGNES_API_KEY exists: $([ -n \"$AGNES_API_KEY\" ] && echo YES || echo NO)"
          echo "DEBUG: AGNES_API_KEY length: $(echo -n \"$AGNES_API_KEY\" | wc -c)"
          echo "DEBUG: Python version: $(python --version 2>&1)"
          echo "DEBUG: openai version: $(pip show openai 2>&1 | head -1)"
          echo "DEBUG: Working directory: $(pwd)"
          python scripts/generate-analysis.py 2>&1 || echo "EXIT CODE: $?"
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}

      - name: Build static site
        run: |
          echo "Step 1: Check Node version"
          node --version
          echo "Step 2: Check npm version"
          npm --version
          echo "Step 3: Check if analysis-output.json exists"
          test -f app/_data/analysis-output.json && echo "YES" || echo "NO"
          echo "Step 4: Run next build"
          npx next build 2>&1
          echo "Step 5: Check if out directory exists"
          ls -la out/ 2>/dev/null || echo "out/ not found"
          echo "Step 6: Check public directory"
          ls -la public/data/ 2>/dev/null || echo "public/data/ not found"

      - name: Upload artifact
        run: |
          echo "Checking out/ directory..."
          ls -la out/ 2>/dev/null || echo "out/ NOT FOUND"
          find out/ -type f | head -20
        id: check-out
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: '${{ steps.deployment.outputs.page_url }}'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
