name: Auto Update Data

on:
  schedule:
    # 每天下午 14:30 (Asia/Shanghai) = 06:30 UTC 运行
    - cron: '30 6 * * *'
  workflow_dispatch:
    # 支持手动触发

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  FETCH_TIMEOUT: '600'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # fetch-real-data.py 仅用标准库, 但保留以备将来扩展
          pip install requests || echo "requests not installed, continue with stdlib only"

      - name: Run fetch-real-data.py
        run: timeout ${{ env.FETCH_TIMEOUT }} python scripts/fetch-real-data.py || echo "fetch-real-data failed, continue"
        shell: bash

      - name: Run bump_technology.py
        run: python scripts/bump_technology.py || echo "bump_technology failed, continue"
        shell: bash

      - name: Check for changes
        id: git-status
        run: |
          if git diff --stat | grep -q ' [0-9]'; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes to main
        if: steps.git-status.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M')
          git commit -m "data: auto update $TIMESTAMP"
          # 同步 main 后再 rebase，避免 push 失败（非 fast-forward）
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
